<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search bus stations and plan routes with EasyBus dashboard.">
  <title>EasyBus - Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="eb"><a href="./home.html">EasyBus</a></div>
    <nav class="navbar">
      <ul>
        <li><a href="./home.html">Home</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <!-- Dashboard -->
  <main class="dashboard">
    <div class="dashboard-header">
      <h1>Bus Information & Routes</h1>
      <p>Search stations or plan your route between stops</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="stationsTab" onclick="switchTab('stations')">Stations</div>
      <div class="tab" id="targetTab" onclick="switchTab('target')">Routes</div>
    </div>

    <!-- Station Search -->
    <div id="stationsForm">
      <div class="search-box">
        <input type="text" id="stationSearch" placeholder="Enter station name (e.g. Station A)...">
        <button onclick="searchStations_flasename()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          Search
        </button>
      </div>
    </div>

    <!-- Route Search -->
    <div id="targetForm" class="hidden">
      <div class="search-box-col">
        <input type="text" id="departure" placeholder="From (e.g. Station A)">
        <input type="text" id="destination" placeholder="To (e.g. Station B)">
        <button onclick="searchRoute()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Find Route
        </button>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="result-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <p>Enter a station name or plan a route to see live results.</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2024 EasyBus. All rights reserved.</p>
  </footer>

  <script src="./js/script.js"></script>
  <script src="./js/app.js"></script>

  <script>
    function switchTab(tab) {
      const stationsTab = document.getElementById('stationsTab');
      const targetTab = document.getElementById('targetTab');
      const stationsForm = document.getElementById('stationsForm');
      const targetForm = document.getElementById('targetForm');
      document.getElementById('results').innerHTML = `
        <div class="result-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <p>Enter a station name or plan a route to see live results.</p>
        </div>`;

      if (tab === 'stations') {
        stationsTab.classList.add('active');
        targetTab.classList.remove('active');
        stationsForm.classList.remove('hidden');
        targetForm.classList.add('hidden');
      } else {
        targetTab.classList.add('active');
        stationsTab.classList.remove('active');
        targetForm.classList.remove('hidden');
        stationsForm.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
