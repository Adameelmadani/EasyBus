<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyBus - Dashboard</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <div class="eb">
            <a href="./home.html">EasyBus</a>
        </div>
        <div class="navbar">
            <ul>
                <li><a href="./home.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <h1>Bus Information & Routes</h1>
        
        <div class="tabs">
            <div class="tab active" id="stationsTab" onclick="switchTab('stations')">Stations</div>
            <div class="tab" id="targetTab" onclick="switchTab('target')">Routes</div>
        </div>

        <div id="stationsForm">
            <div class="search-form" style="display: flex; gap: 10px; margin-bottom: 2rem; max-width: 100%;">
                <input type="text" id="stationSearch" placeholder="Enter station name (e.g. Station A)..." style="flex: 1;">
                <button onclick="searchStations_flasename()">Search</button>
            </div>
        </div>

        <div id="targetForm" class="hidden">
            <div class="search-form" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; max-width: 100%;">
                <input type="text" id="departure" placeholder="From (e.g. Station A)">
                <input type="text" id="destination" placeholder="To (e.g. Station B)">
                <button onclick="searchRoute()">Find Route</button>
            </div>
        </div>

        <div id="results">
            <!-- Results will be displayed here -->
            <p style="text-align: center; color: var(--text-muted);">Enter a station or route to see live results.</p>
        </div>
    </div>

    <script src="./js/script.js"></script>
    <script src="./js/app.js"></script>
    
    <footer class="footer">
        <p>&copy; 2024 EasyBus. All rights reserved.</p>
    </footer>

    <script>
        function switchTab(tab) {
            const stationsTab = document.getElementById('stationsTab');
            const targetTab = document.getElementById('targetTab');
            const stationsForm = document.getElementById('stationsForm');
            const targetForm = document.getElementById('targetForm');

            if (tab === 'stations') {
                stationsTab.classList.add('active');
                targetTab.classList.remove('active');
                stationsForm.classList.remove('hidden');
                targetForm.classList.add('hidden');
            } else {
                targetTab.classList.add('active');
                stationsTab.classList.remove('active');
                targetForm.classList.remove('hidden');
                stationsForm.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
