<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="EasyBus interactive map - view all bus stations and routes on a live map.">
  <title>EasyBus - Route Map</title>
  <link rel="stylesheet" href="./css/style.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    .map-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 2rem;
      flex: 1;
      position: relative;
      z-index: 1;
      animation: fadeIn .5s ease;
    }
    .map-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .map-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: .5rem;
    }
    .map-header p {
      color: var(--gray-500);
      font-size: .95rem;
    }
    #map {
      width: 100%;
      height: 500px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      overflow: hidden;
      z-index: 1;
    }
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 1.2rem;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: .82rem;
      font-weight: 600;
      color: var(--gray-700);
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--glass-shadow);
    }
    .legend-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }
    .legend-item.active {
      background: var(--glass-bg-strong);
      border-color: rgba(16,185,129,.3);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .map-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 1rem;
    }
    .map-controls button {
      padding: 8px 20px;
      font-size: .85rem;
    }
    /* Leaflet popup overrides */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      box-shadow: 0 8px 25px rgba(0,0,0,.12) !important;
      font-family: 'Inter', sans-serif !important;
    }
    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-size: .9rem !important;
      line-height: 1.5 !important;
    }
    .leaflet-popup-content .popup-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--gray-900);
      margin-bottom: 4px;
    }
    .leaflet-popup-content .popup-buses {
      color: var(--gray-600);
      font-size: .82rem;
    }
    .leaflet-popup-content .popup-bus-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 50px;
      font-size: .72rem;
      font-weight: 600;
      color: white;
      margin: 2px 2px 2px 0;
    }
    @media (max-width: 768px) {
      .map-container { padding: 0 1rem; }
      #map { height: 400px; }
    }
  </style>
</head>
<body>

  <!-- Animated Background Orbs -->
  <div class="animated-bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="eb"><a href="./home.html">EasyBus</a></div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="navbar" id="navbar">
      <ul>
        <li><a href="./home.html">Home</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>
  </header>

  <!-- Map Page -->
  <div class="map-container">
    <div class="map-header">
      <h1>Route Map</h1>
      <p>Interactive map of all bus stations and routes</p>
    </div>

    <div id="map"></div>

    <div class="map-legend" id="map-legend"></div>

    <div class="map-controls">
      <button onclick="showAllRoutes()">Show All Routes</button>
      <button onclick="fitAllStations()">Fit View</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 EasyBus. All rights reserved.</p>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="./js/app.js"></script>
  <script>
    let map;
    let routeLayers = {};
    let stationMarkers = {};
    let allBusData = [];

    // Custom green station marker
    function createStationIcon(color) {
      return L.divIcon({
        html: `<div style="
          width: 14px; height: 14px;
          background: ${color || '#10b981'};
          border: 3px solid white;
          border-radius: 50%;
          box-shadow: 0 2px 6px rgba(0,0,0,.3);
        "></div>`,
        className: 'custom-marker',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
        popupAnchor: [0, -12]
      });
    }

    // Hub marker (stations served by 3+ buses)
    function createHubIcon() {
      return L.divIcon({
        html: `<div style="
          width: 22px; height: 22px;
          background: linear-gradient(135deg, #10b981, #059669);
          border: 3px solid white;
          border-radius: 50%;
          box-shadow: 0 3px 10px rgba(16,185,129,.4);
          display: flex; align-items: center; justify-content: center;
        "><div style="width:6px;height:6px;background:white;border-radius:50%;"></div></div>`,
        className: 'custom-marker',
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -16]
      });
    }

    async function initMap() {
      // Initialize Leaflet map
      map = L.map('map', {
        zoomControl: true,
        scrollWheelZoom: true
      }).setView([48.8566, 2.3522], 14);

      // Tile layer — Clean CartoDB style
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      // Fetch map data
      try {
        const res = await fetch('/api/map');
        if (!res.ok) throw new Error('Failed to fetch map data');
        allBusData = await res.json();
        renderMap(allBusData);
      } catch (error) {
        console.error('Map error:', error);
        if (typeof showToast === 'function') showToast('Failed to load map data', 'error');
      }
    }

    function renderMap(buses) {
      // Count how many buses serve each station
      const stationBusCount = {};
      const stationBuses = {};

      buses.forEach(bus => {
        bus.stations.forEach(s => {
          if (!stationBusCount[s.name]) {
            stationBusCount[s.name] = 0;
            stationBuses[s.name] = [];
          }
          stationBusCount[s.name]++;
          stationBuses[s.name].push({ busId: bus.busId, name: bus.name, color: bus.color });
        });
      });

      // Add routes and markers
      buses.forEach(bus => {
        const coords = bus.stations
          .filter(s => s.lat && s.lng)
          .map(s => [s.lat, s.lng]);

        // Draw route polyline
        const polyline = L.polyline(coords, {
          color: bus.color,
          weight: 4,
          opacity: 0.75,
          smoothFactor: 1.5,
          dashArray: null
        }).addTo(map);

        routeLayers[bus.busId] = polyline;

        // Add station markers
        bus.stations.forEach(s => {
          if (!s.lat || !s.lng) return;
          if (stationMarkers[s.name]) return; // already added

          const isHub = stationBusCount[s.name] >= 3;
          const icon = isHub ? createHubIcon() : createStationIcon('#10b981');

          // Build popup
          const busTagsHtml = stationBuses[s.name].map(b => 
            `<span class="popup-bus-tag" style="background:${b.color}">${b.busId}</span>`
          ).join('');

          const marker = L.marker([s.lat, s.lng], { icon })
            .bindPopup(`
              <div class="popup-title">${s.name}</div>
              <div class="popup-buses">${stationBusCount[s.name]} bus${stationBusCount[s.name] > 1 ? 'es' : ''} serve this station</div>
              <div style="margin-top:6px">${busTagsHtml}</div>
            `)
            .addTo(map);

          stationMarkers[s.name] = marker;
        });
      });

      // Build legend
      buildLegend(buses);
    }

    function buildLegend(buses) {
      const legend = document.getElementById('map-legend');
      legend.innerHTML = buses.map(bus => `
        <div class="legend-item active" data-bus="${bus.busId}" onclick="toggleRoute('${bus.busId}')">
          <span class="legend-dot" style="background:${bus.color}"></span>
          ${bus.busId} — ${bus.name}
        </div>
      `).join('');
    }

    function toggleRoute(busId) {
      const layer = routeLayers[busId];
      const legendItem = document.querySelector(`.legend-item[data-bus="${busId}"]`);
      if (!layer) return;

      if (map.hasLayer(layer)) {
        map.removeLayer(layer);
        legendItem.classList.remove('active');
      } else {
        map.addLayer(layer);
        legendItem.classList.add('active');
      }
    }

    function showAllRoutes() {
      Object.keys(routeLayers).forEach(busId => {
        if (!map.hasLayer(routeLayers[busId])) {
          map.addLayer(routeLayers[busId]);
        }
        const legendItem = document.querySelector(`.legend-item[data-bus="${busId}"]`);
        if (legendItem) legendItem.classList.add('active');
      });
    }

    function fitAllStations() {
      const allCoords = [];
      Object.values(stationMarkers).forEach(marker => {
        allCoords.push(marker.getLatLng());
      });
      if (allCoords.length > 0) {
        map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40] });
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
