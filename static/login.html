<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your EasyBus account to access bus tracking and route planning.">
  <title>EasyBus - Log In</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Animated Background Orbs -->
  <div class="animated-bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="eb"><a href="./home.html">EasyBus</a></div>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="navbar" id="navbar">
      <ul>
        <li><a href="./home.html">Home</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="./login.html">Log In</a></li>
        <li><a href="./index.html" class="nav-cta">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login Form -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to continue your journey</p>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div class="form-row">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Log In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="./index.html">Sign Up</a></p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 EasyBus. All rights reserved.</p>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
